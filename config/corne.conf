# ----------------------------------------------------------------------------
# RGB underglow (per-key + underglow WS2812 strip, 27 LEDs per half)
# ----------------------------------------------------------------------------
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

# Keep RGB on while idle / on USB. Note: this drains battery faster on the
# peripheral half. Set to `y` if you want to save power.
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# ----------------------------------------------------------------------------
# OLED display (SSD1306 128x32 on I2C - already wired in the official `corne`
# shield, we only need to enable the display subsystem).
# ----------------------------------------------------------------------------
CONFIG_ZMK_DISPLAY=y

# ----------------------------------------------------------------------------
# ZMK Studio (live keymap editing over USB).
# Locking requires a `&studio_unlock` keypress before edits are accepted.
# Disabled here for convenience during initial setup; flip to `y` later.
# ----------------------------------------------------------------------------
CONFIG_ZMK_STUDIO_LOCKING=n
